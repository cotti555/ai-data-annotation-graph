<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>岗位能力知识图谱</title>
<style>
:root{
  --bg:#070b1d; --panel:#10172f; --panel2:#0d1328; --text:#eaf1ff; --muted:#94a3b8;
  --line:#26314f; --task:#f59e0b; --comp:#38bdf8; --skill:#22c55e; --root:#fb7185;
  --glow:#60a5fa; --border:rgba(148,163,184,.22);
}
*{box-sizing:border-box} html,body{height:100%;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:radial-gradient(circle at 18% 8%,rgba(59,130,246,.20),transparent 30%),radial-gradient(circle at 80% 15%,rgba(168,85,247,.16),transparent 34%),linear-gradient(180deg,#070b1d 0%,#060817 100%);color:var(--text);overflow:hidden}
#app{height:100%;display:grid;grid-template-rows:auto 1fr}
.header{padding:16px 22px 14px;border-bottom:1px solid var(--border);background:rgba(7,11,29,.78);backdrop-filter:blur(18px);box-shadow:0 18px 50px rgba(0,0,0,.22);z-index:5}
.topline{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,#60a5fa,#a78bfa);box-shadow:0 0 28px rgba(96,165,250,.45);display:grid;place-items:center;font-weight:900;color:#061225}
h1{margin:0;font-size:22px;letter-spacing:.5px;background:linear-gradient(135deg,#e0f2fe,#c4b5fd);-webkit-background-clip:text;background-clip:text;color:transparent}
.subtitle{margin:6px 0 0 48px;color:var(--muted);font-size:13px;line-height:1.45}
.toolbar{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.input{width:220px;height:34px;padding:0 12px;border:1px solid var(--border);border-radius:10px;background:rgba(15,23,42,.72);color:var(--text);outline:none}.input:focus{border-color:rgba(96,165,250,.72);box-shadow:0 0 0 3px rgba(96,165,250,.14)}
.btn{height:34px;padding:0 12px;border:1px solid var(--border);border-radius:10px;background:rgba(15,23,42,.72);color:#dbeafe;cursor:pointer;transition:.18s;font-size:13px}.btn:hover{transform:translateY(-1px);border-color:rgba(96,165,250,.6);background:rgba(30,41,59,.88)}.btn.active{background:linear-gradient(135deg,#2563eb,#7c3aed);border-color:transparent;color:white;box-shadow:0 10px 24px rgba(37,99,235,.22)}
.main{position:relative;overflow:hidden}.canvas-wrap{position:absolute;inset:0;overflow:auto;padding:26px 28px 40px}.canvas-wrap::-webkit-scrollbar{height:10px;width:10px}.canvas-wrap::-webkit-scrollbar-thumb{background:#25304b;border-radius:999px}.canvas-wrap::-webkit-scrollbar-track{background:#0a1024}
svg{display:block;min-width:100%;filter:drop-shadow(0 14px 35px rgba(0,0,0,.28))}.edge{fill:none;stroke:rgba(148,163,184,.28);stroke-width:1.4}.edge.dim{opacity:.08}.node{cursor:pointer;transition:opacity .2s}.node-card{rx:16;ry:16;fill:rgba(15,23,42,.86);stroke:rgba(148,163,184,.24);stroke-width:1}.node:hover .node-card{stroke:rgba(96,165,250,.78);filter:url(#softGlow)}.node-title{font-size:13px;font-weight:700;fill:#edf5ff;pointer-events:none}.node-meta{font-size:10px;fill:#8ea3bd;pointer-events:none}.node-dot{stroke:rgba(255,255,255,.42);stroke-width:1}.node.dim{opacity:.12}.node.highlight .node-card{stroke:#facc15;stroke-width:2;filter:url(#yellowGlow)}
.column-title{font-size:13px;fill:#cbd5e1;font-weight:800;letter-spacing:.8px}.column-line{stroke:rgba(148,163,184,.10);stroke-width:1}.stats{position:absolute;left:24px;bottom:22px;background:rgba(15,23,42,.74);border:1px solid var(--border);border-radius:16px;padding:12px 14px;display:grid;gap:7px;box-shadow:0 20px 48px rgba(0,0,0,.28);backdrop-filter:blur(16px);font-size:12px}.stat-row{display:flex;align-items:center;gap:8px;color:#cbd5e1}.legend-dot{width:10px;height:10px;border-radius:999px}.pill{position:absolute;right:24px;bottom:22px;background:rgba(15,23,42,.74);border:1px solid var(--border);border-radius:16px;padding:12px 14px;color:#9fb2cc;font-size:12px;line-height:1.6;backdrop-filter:blur(16px);text-align:right}.detail{position:absolute;top:24px;right:24px;width:min(380px,calc(100vw - 48px));max-height:calc(100vh - 160px);overflow:auto;padding:18px;background:linear-gradient(180deg,rgba(15,23,42,.94),rgba(9,13,30,.94));border:1px solid var(--border);border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.38);backdrop-filter:blur(18px);display:none}.detail.show{display:block}.detail h2{font-size:18px;margin:0 30px 8px 0}.detail .tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;margin-bottom:12px}.detail p{font-size:13px;color:#cbd5e1;line-height:1.62;margin:8px 0}.detail b{color:#f8fafc}.close{position:absolute;top:12px;right:14px;border:0;background:transparent;color:#94a3b8;font-size:20px;cursor:pointer}.toast{position:absolute;top:86px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.92);border:1px solid var(--border);border-radius:999px;padding:9px 16px;color:#e2e8f0;font-size:13px;box-shadow:0 18px 44px rgba(0,0,0,.26);opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1;top:96px}.empty{position:absolute;inset:0;display:grid;place-items:center;color:#94a3b8;text-align:center;padding:24px}.empty strong{color:#e2e8f0}
@media(max-width:900px){.subtitle{margin-left:0}.toolbar{width:100%;margin-left:0}.input{flex:1;width:180px}.header{padding:14px}.canvas-wrap{padding:16px}.pill{display:none}}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="topline">
      <div class="logo">KG</div>
      <div>
        <h1>岗位能力知识图谱</h1>
        <div class="subtitle" id="subtitle">输入 graph_json → 脚本生成 URL → 点击即可查看美化知识图谱</div>
      </div>
      <div class="toolbar">
        <input class="input" id="searchInput" placeholder="搜索任务 / 能力 / 技能..." />
        <button class="btn active" data-filter="all">全部</button>
        <button class="btn" data-filter="task">任务</button>
        <button class="btn" data-filter="competency">能力</button>
        <button class="btn" data-filter="skill">技能</button>
        <button class="btn" id="copyBtn">复制链接</button>
        <button class="btn" id="resetBtn">回到中心</button>
      </div>
    </div>
  </header>
  <main class="main">
    <div class="canvas-wrap" id="wrap"><svg id="graph"></svg></div>
    <aside class="detail" id="detail"><button class="close" id="closeDetail">×</button><div id="detailContent"></div></aside>
    <div class="stats" id="stats"></div>
    <div class="pill" id="sourcePill">本地示例数据<br/>工作流 URL 会自动替换为新数据</div>
    <div class="toast" id="toast">已复制</div>
  </main>
</div>
<script>
const DEMO_DATA = {"meta":{"job_title":"AI数据标注师","schema_version":"1.0","stats":{"tasks":13,"competencies":8,"skills":21,"edges":54}},"entities":{"industry_chain":{"description":"为人工智能模型训练提供数据采集、处理与标注服务的产业环节。","name":"人工智能基础数据服务产业"},"job_group":{"description":"专注于对原始数据进行分类、标记、注释，以满足人工智能模型训练需求的岗位群。","name":"数据标注"},"job":{"career_level":"初级","name":"AI数据标注师","related_positions":["数据标注工程师","数据标注质量审核员","数据采集员"],"summary":"依据特定规则对文本、图像、语音等数据进行分类、打标、框选与转写，为人工智能算法提供高质量训练数据。"},"tasks":[{"id":"T001","name":"原始数据格式转换与整理","description":"将采集到的原始图像、文本等数据按照统一格式进行转换，并整理到指定目录结构。","category":"数据清洗","data_type":"图像","level":"初级"},{"id":"T002","name":"图像数据质量筛选","description":"依据清晰度、内容完整性等规则，筛选出符合要求的图像数据，剔除模糊、重复或无关的图像。","category":"数据清洗","data_type":"图像","level":"初级"},{"id":"T003","name":"执行矩形框标注","description":"在图像中，使用矩形框工具精确框选出指定目标物体（如车辆、行人）。","category":"数据标注","data_type":"图像","level":"初级"},{"id":"T004","name":"执行文本分类标注","description":"根据预设的分类体系，对给定的新闻、评论等文本内容进行分类标签的标注。","category":"数据标注","data_type":"文本","level":"初级"},{"id":"T005","name":"执行语音内容转写","description":"将指定音频文件中的对话或独白内容，准确无误地转写成对应的文本。","category":"数据标注","data_type":"语音","level":"初级"},{"id":"T006","name":"标注结果交叉校验","description":"对同一批已完成的基础标注任务（如框选、分类）进行交叉比对，检查并修正不一致的标注结果。","category":"质量校验","data_type":"图像","level":"中级"},{"id":"T007","name":"执行视频关键帧目标跟踪标注","description":"在视频序列中，对连续运动的特定目标（如行人）进行跨帧的边界框标注与轨迹跟踪。","category":"数据标注","data_type":"视频","level":"中级"},{"id":"T008","name":"标注数据版本管理与归档","description":"对已完成标注的数据集进行版本化存储、归档，并更新相关元数据信息，确保数据可追溯。","category":"数据管理","data_type":"多模态","level":"中级"},{"id":"T009","name":"3D点云场景语义分割标注","description":"在自动驾驶场景的3D点云数据中，对点云簇进行精细化分类（如道路、车辆、行人），完成语义分割标注。","category":"数据标注","data_type":"3D点云","level":"高级"},{"id":"T010","name":"复杂多模态数据对齐与标注","description":"对同一事件的多模态数据（如监控视频、同步录音、文本报告）进行时间、空间或内容上的对齐与关联标注。","category":"数据标注","data_type":"多模态","level":"高级"},{"id":"T011","name":"制定与优化标注规范与质检规则","description":"根据项目需求和模型反馈，制定或优化具体的标注操作规范、质检标准与验收流程。","category":"质量校验","data_type":"多模态","level":"高级"},{"id":"T012","name":"标注工具（如CVAT）模板与工作流配置","description":"根据项目标注需求，在标注工具中配置标签体系、快捷键、自动化辅助工具和多人协作工作流。","category":"工具维护","data_type":"图像","level":"高级"},{"id":"T013","name":"标注任务进度与质量监控报告","description":"监控标注任务的整体进度、人员效率和标注质量，定期生成分析报告并提出改进建议。","category":"数据管理","data_type":"多模态","level":"中级"}],"competencies":[{"id":"C001","name":"多模态数据预处理与清洗","description":"能够对图像、文本、语音等原始数据进行格式转换、标准化整理、质量筛选与去重，为后续标注工作准备高质量的数据源。","level":"初级","related_task_ids":["T001","T002"],"type":"专业能力"},{"id":"C002","name":"基础数据标注与转写","description":"掌握图像目标框选、文本分类、语音内容转写等基础标注任务的操作规范与工具使用，能够准确、高效地完成单模态数据的标注。","level":"初级","related_task_ids":["T003","T004","T005"],"type":"专业能力"},{"id":"C003","name":"复杂场景与动态数据标注","description":"能够处理视频序列中的目标跟踪、3D点云语义分割等复杂标注任务，理解时空连续性，完成精细化、结构化的标注。","level":"高级","related_task_ids":["T007","T009"],"type":"专业能力"},{"id":"C004","name":"多模态数据融合与关联标注","description":"能够对来自不同来源（视频、音频、文本）的数据进行时间、空间或内容上的对齐与关联，完成跨模态的复杂标注任务。","level":"高级","related_task_ids":["T010"],"type":"专业能力"},{"id":"C005","name":"标注质量保证与流程优化","description":"具备交叉校验、质量监控与问题分析能力，并能根据项目需求与反馈，制定、优化标注规范与质检规则，持续提升标注质量与效率。","level":"高级","related_task_ids":["T006","T011","T013"],"type":"方法能力"},{"id":"C006","name":"标注数据与流程管理","description":"能够对标注数据进行版本化、归档化与元数据管理，确保数据可追溯。同时，能够监控任务进度，生成分析报告并提出改进建议。","level":"中级","related_task_ids":["T008","T013"],"type":"方法能力"},{"id":"C007","name":"标注工具配置与维护","description":"能够根据具体项目需求，熟练配置标注工具（如CVAT）的标签体系、工作流模板、自动化辅助功能及协作设置，以提升团队标注效率。","level":"高级","related_task_ids":["T012"],"type":"方法能力"},{"id":"C008","name":"协作沟通与规范理解","description":"能够准确理解并执行标注规范与任务要求，在交叉校验、质量监控及工具配置等工作中进行有效沟通与协作，确保任务目标一致。","level":"中级","related_task_ids":["T006","T011","T012","T013"],"type":"社会能力"}],"skills":[{"id":"S001","name":"图像数据格式转换与统一","description":"能够使用脚本或工具（如PIL, OpenCV）将不同格式（如PNG, JPG, BMP, TIFF）的图像批量转换为项目要求的统一格式，并处理色彩空间（如RGB, 灰度）的转换。","type":"硬技能","related_competency_ids":["C001"],"tool_related":"None","difficulty":"基础"},{"id":"S002","name":"文本数据清洗与分词","description":"能够使用Python（如NLTK, jieba）或正则表达式对原始文本进行清洗，包括去除无关字符、停用词过滤、统一编码格式以及根据任务需求进行分词处理。","type":"硬技能","related_competency_ids":["C001"],"tool_related":"None","difficulty":"基础"},{"id":"S003","name":"数据质量筛选规则制定","description":"能够根据数据特性（如图像模糊度、文本长度、音频信噪比）制定可量化的质量筛选标准，并编写或使用脚本进行自动化筛选，剔除低质量样本。","type":"硬技能","related_competency_ids":["C001"],"tool_related":"None","difficulty":"进阶"},{"id":"S004","name":"数据去重与相似度计算","description":"掌握基于哈希（如图像感知哈希）或嵌入（如文本/图像向量）的相似度计算方法，能够识别并处理数据集中的重复或高度相似样本，确保数据多样性。","type":"硬技能","related_competency_ids":["C001"],"tool_related":"None","difficulty":"进阶"},{"id":"S005","name":"CVAT图像目标框标注","description":"能够在CVAT中熟练使用矩形框工具对图像中的目标进行框选，掌握快捷键操作（如N新建，C复制），并准确选择对应的标签类别。","type":"工具操作","related_competency_ids":["C002"],"tool_related":"CVAT","difficulty":"基础"},{"id":"S006","name":"Label Studio文本分类标注","description":"能够在Label Studio中配置和操作文本分类任务，为给定的文本段落或句子选择正确的预定义类别标签。","type":"工具操作","related_competency_ids":["C002"],"tool_related":"Label Studio","difficulty":"基础"},{"id":"S007","name":"语音内容转写规范理解","description":"能够准确理解语音转写任务的要求，包括对特殊词汇、标点符号、说话人分离、背景噪音处理的标注规范，并严格执行。","type":"理论知识","related_competency_ids":["C002"],"tool_related":"通用","difficulty":"基础"},{"id":"S008","name":"Labelme多边形与关键点标注","description":"能够使用Labelme对不规则物体进行多边形标注，或对特定结构（如人体关节点）进行关键点标注，并正确导出标注文件（JSON格式）。","type":"工具操作","related_competency_ids":["C002"],"tool_related":"Labelme","difficulty":"基础"},{"id":"S009","name":"CVAT视频目标跟踪标注","description":"能够在CVAT中为视频序列中的目标创建轨迹（Track），并在连续帧间使用插值或手动调整进行跟踪，确保目标ID在时空上的连续性。","type":"工具操作","related_competency_ids":["C003"],"tool_related":"CVAT","difficulty":"高级"},{"id":"S010","name":"3D点云数据可视化与理解","description":"能够理解3D点云数据（如.pcd, .ply格式）的基本结构，并使用可视化工具（如CloudCompare）或标注工具查看数据，识别空间中的物体与场景。","type":"硬技能","related_competency_ids":["C003"],"tool_related":"通用","difficulty":"进阶"},{"id":"S011","name":"3D点云语义分割原理","description":"理解3D语义分割任务的目标，即对点云中的每个点赋予一个语义标签（如车辆、行人、建筑），并了解常见场景的类别定义。","type":"理论知识","related_competency_ids":["C003"],"tool_related":"None","difficulty":"进阶"},{"id":"S012","name":"复杂场景标注的耐心与专注力","description":"在处理长时间视频跟踪或高密度点云分割任务时，能够保持高度的专注力和耐心，确保标注的精细度和一致性，避免因疲劳导致的错误。","type":"软技能","related_competency_ids":["C003"],"tool_related":"None","difficulty":"进阶"},{"id":"S013","name":"多模态数据时间戳对齐","description":"能够识别并处理来自不同传感器（如摄像头、麦克风）数据的时间戳信息，使用脚本或工具将多路数据流在时间轴上进行精确对齐。","type":"硬技能","related_competency_ids":["C004"],"tool_related":"None","difficulty":"高级"},{"id":"S014","name":"跨模态关联标注任务设计","description":"能够理解并执行如“视频中的物体对应哪段语音描述”或“图像区域对应哪段文本”等关联任务，在标注工具中建立正确的跨模态链接。","type":"理论知识","related_competency_ids":["C004"],"tool_related":"通用","difficulty":"高级"},{"id":"S015","name":"抽象关联思维","description":"具备将不同模态信息（视觉、听觉、文本）在语义层面进行关联和匹配的思维能力，能够判断跨模态数据之间是否存在合理的对应关系。","type":"软技能","related_competency_ids":["C004"],"tool_related":"None","difficulty":"高级"},{"id":"S016","name":"标注结果交叉校验方法","description":"掌握通过抽样、多人标注一致性计算（如Kappa系数）等方式对标注结果进行交叉验证，识别并定位标注不一致或错误的高发区域。","type":"方法能力","related_competency_ids":["C005"],"tool_related":"通用","difficulty":"进阶"},{"id":"S017","name":"标注问题根因分析","description":"能够对质检中发现的问题进行分类（如规范理解偏差、工具操作失误、注意力分散），并分析其根本原因，为优化规范或培训提供依据。","type":"软技能","related_competency_ids":["C005"],"tool_related":"None","difficulty":"进阶"},{"id":"S018","name":"标注规范文档撰写与迭代","description":"能够根据项目反馈和问题分析结果，清晰、无歧义地撰写或更新标注规范文档，包含正例、反例和边界案例说明，确保可操作性。","type":"软技能","related_competency_ids":["C005"],"tool_related":"None","difficulty":"高级"},{"id":"S019","name":"数据版本管理概念与工具","description":"理解数据版本管理的重要性，掌握使用Git LFS、DVC（Data Version Control）或专用数据平台对标注数据集进行版本化管理的概念与基本操作。","type":"理论知识","related_competency_ids":["C006"],"tool_related":"通用","difficulty":"中级"},{"id":"S020","name":"标注任务进度监控与报告","description":"能够使用项目管理工具或仪表盘监控标注任务的完成进度、人员产出和质量指标，并定期生成简洁明了的分析报告。","type":"方法能力","related_competency_ids":["C006"],"tool_related":"通用","difficulty":"中级"},{"id":"S021","name":"元数据设计与记录","description":"能够根据项目需求，设计并记录标注数据的元信息，如数据来源、标注人员、标注时间、质检状态、使用的规范版本等，确保数据可追溯。","type":"硬技能","related_competency_ids":["C006"],"tool_related":"None","difficulty":"中级"}]},"edges":[{"source":"人工智能基础数据服务产业","target":"数据标注" function cleanText(s){return String(s??'').replace(/([\u4e00-\u9fff])\s+(?=[\u4e00-\u9fff])/g,'$1').replace(/\s+/g,' ').trim();}
function canon(s){return String(s??'').replace(/\s+/g,'').trim();}
function truncate(s,n=15){s=cleanText(s);return s.length>n?s.slice(0,n)+'…':s;}
async function decodeURLData(){
  const params=new URLSearchParams(location.search);
  const token=params.get('d')||params.get('j');
  if(!token)return null;
  function tokenToBytes(t){
    let b64=String(t).replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length%4)b64+='=';
    const bin=atob(b64);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    return bytes;
  }
  function parseRaw(t){
    const bytes=tokenToBytes(t);
    const text=new TextDecoder().decode(bytes);
    return JSON.parse(text);
  }
  // 兼容两种链接：
  // 1. ?d=deflate压缩后的数据（旧版/短链接）
  // 2. ?j=未压缩base64数据（讯飞星辰兼容版，不依赖Python zlib）
  if(params.get('j')){
    try{return parseRaw(params.get('j'));}
    catch(e){console.error(e);alert('URL 数据解析失败，请确认链接完整。');return null;}
  }
  try{
    const bytes=tokenToBytes(token);
    const ds=new DecompressionStream('deflate');
    const writer=ds.writable.getWriter();
    const reader=ds.readable.getReader();
    writer.write(bytes);writer.close();
    const chunks=[];
    while(true){const {value,done}=await reader.read();if(done)break;if(value)chunks.push(value)}
    let len=chunks.reduce((a,b)=>a+b.length,0),out=new Uint8Array(len),off=0;
    for(const c of chunks){out.set(c,off);off+=c.length}
    return JSON.parse(new TextDecoder().decode(out));
  }catch(e1){
    try{return parseRaw(token);}catch(e2){console.error(e1,e2);alert('URL 数据解析失败。请确认链接完整，或使用 Chrome/Edge 打开。');return null;}
  }
}

function computeLayout(){const groups=Object.fromEntries(ORDER.map(t=>[t,graph.nodes.filter(n=>n.type===t)]));const maxN=Math.max(...Object.values(groups).map(a=>a.length),1);const colGap=230, startX=95, top=130, rowGap=58;layout.w=startX*2+colGap*(ORDER.length-1)+190;layout.h=Math.max(820,top+maxN*rowGap+120);layout.nodes=new Map();ORDER.forEach((type,ci)=>{const arr=groups[type]||[],x=startX+ci*colGap;const total=(arr.length-1)*rowGap;const base=Math.max(top,(layout.h-total)/2);arr.sort((a,b)=>a.id.localeCompare(b.id,'zh-CN')).forEach((n,i)=>{layout.nodes.set(n.id,{x,y:base+i*rowGap,w:type==='skill'?174:176,h:42})})})}

(async function init(){const data=await decodeURLData();rawData=data||DEMO_DATA;document.getElementById('sourcePill').innerHTML=data?'URL 数据已加载<br/>该链接可直接分享查看':'本地示例数据<br/>工作流 URL 会自动替换为新数据';graph=buildGraph(rawData);render();setTimeout(()=>document.getElementById('resetBtn').click(),80);})();
</script>
